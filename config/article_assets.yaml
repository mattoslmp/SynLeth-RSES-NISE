article:
  title: RSES-Onco expanded human functional-microniche and synthetic-lethality framework
  output_root: article_outputs

main_figures:
  - id: Figure_1
    file: Figure_1_framework
    title: Expanded RSES-Onco framework
    caption: >-
      Scripted overview of the source-bounded candidate universe, human functional-microniche evidence,
      cancer-selective dependency analysis, pharmacological actionability layer and experimental-validation path.
  - id: Figure_2
    file: Figure_2_candidate_universe
    title: Candidate universe across mechanistic classes
    caption: >-
      Counts of directed candidates by mechanistic class and representation of all curated human NISE activity groups.
  - id: Figure_3
    file: Figure_3_cancer_specific_ranking
    title: Cancer-specific RSES-Onco vulnerability ranking
    caption: >-
      Coverage-adjusted vulnerability rankings for colorectal, gastric and lung cancer, retaining missing domains as missing.
  - id: Figure_4
    file: Figure_4_tcga_depmap_integration
    title: Integration of tumor events and conditional dependencies
    caption: >-
      TCGA/GDC homozygous-deletion prevalence compared with DepMap conditional target selectivity in each cancer context.
  - id: Figure_5
    file: Figure_5_functional_microniches
    title: Human functional-microniche evidence map
    caption: >-
      Expression, localization, biochemical/structural, CRISPR phenotype, STRING and regulatory-network components for top candidates.
  - id: Figure_6
    file: Figure_6_class_discoveries
    title: Mechanistic classes and all-target discoveries
    caption: >-
      Strongest class-specific and all-target conditional-dependency discoveries with effect size, evidence coverage and FDR context.
  - id: Figure_7
    file: Figure_7_pharmacology
    title: Pharmacological actionability and experimental treatment hypotheses
    caption: >-
      Target-drug actionability, compound evidence, clinical maturity and biomarker-matched sensitivity integrated with vulnerability strength.

