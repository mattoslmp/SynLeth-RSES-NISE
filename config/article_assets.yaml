article:
  title: RSES-Onco expanded human functional-microniche and synthetic-lethality framework
  output_root: article_outputs

main_figures:
  - id: Figure_1
    file: Figure_1_framework
    title: Expanded RSES-Onco framework
    caption: >-
      Source-bounded candidate universe, functional-microniche evidence, cancer-selective dependency analysis,
      pharmacological actionability and experimental-validation workflow.
  - id: Figure_2
    file: Figure_2_candidate_universe
    title: Candidate universe across mechanistic classes
    caption: >-
      Complete directed-candidate counts with an explicit enlargement of low-frequency classes and all curated human NISE activity groups.
  - id: Figure_3
    file: Figure_3_cancer_specific_ranking
    title: Cancer-specific RSES-Onco vulnerability ranking
    caption: >-
      Coverage-adjusted vulnerability rankings for colorectal, gastric and lung cancer; composite biomarkers,
      prioritized hypotheses, nominal results and FDR-supported discoveries remain explicitly distinguished.
  - id: Figure_4
    file: Figure_4_tcga_depmap_integration
    title: Integration of tumor events and conditional dependencies
    caption: >-
      Biologically bounded TCGA/GDC homozygous-deletion frequencies compared with DepMap conditional target selectivity,
      with a separate exact-value key for numbered points.
  - id: Figure_5
    file: Figure_5_functional_microniches
    title: Human functional-microniche evidence map
    caption: >-
      Observed expression, localization, biochemical/structural, CRISPR phenotype, STRING and regulatory-network
      components; unavailable and non-eligible domains are explicitly marked and never imputed as zero.
  - id: Figure_6
    file: Figure_6_class_discoveries
    title: Mechanistic classes and all-target discoveries
    caption: >-
      Class medians, maxima, sample sizes and exact FDR-supported all-target conditional-dependency results.
  - id: Figure_7
    file: Figure_7_pharmacology
    title: Pharmacological actionability and experimental treatment hypotheses
    caption: >-
      Compound-resolved actionability hypotheses and the density of all scored pharmacology records; tractability is not clinical efficacy.
  - id: Figure_8
    file: Figure_8_human_nise_structures
    title: Structural basis of representative human NISE vulnerabilities
    caption: >-
      AlphaFold DB models for representative ranked human NISE directions, with traceable exact-numbered functional residues.

