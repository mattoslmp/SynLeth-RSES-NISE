  gdc_dir: data/raw/gdc
  processed_dir: data/processed
  depmap_results_dir: results/empirical_26Q1/depmap_only
  full_results_dir: results/empirical_26Q1/full
  empirical_figures_dir: figures/empirical_26Q1

files:
