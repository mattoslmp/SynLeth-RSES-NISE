name: Apply methylation v0.11.1 integration

on:
  push:
    branches:
      - agent/tcga-methylation-layer-v0111

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'Apply generated methylation v0.11.1 patch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tcga-methylation-layer-v0111
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install patch dependencies
        run: python -m pip install pyyaml

      - name: Apply core and publication patches
        run: |
          python scripts/apply_methylation_v0111_core_patch.py
          python scripts/apply_methylation_v0111_publication_patch.py

      - name: Validate syntax after patch
        run: |
          python -m compileall -q src scripts tests
          bash -n scripts/resume_wgcna_regulatory_pipeline.sh
          bash -n scripts/verify_complete_article_run.sh

      - name: Commit generated repository changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            CITATION.cff \
            README.md \
            config/article_assets.yaml \
            docs \
            environment.yml \
            manuscript \
            pyproject.toml \
            scripts \
            supplementary \
            tests
          if git diff --cached --quiet; then
            echo "No generated patch changes to commit."
          else
            git commit -m "Apply generated methylation v0.11.1 patch"
            git push origin HEAD:agent/tcga-methylation-layer-v0111
          fi
