name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pytest
      - run: python -m compileall -q src scripts
      - run: bash -n scripts/run_real_data_pipeline.sh
      - run: bash -n scripts/run_expanded_pipeline.sh
      - run: bash -n scripts/run_publication_pipeline.sh
      - run: bash -n scripts/run_structural_pipeline.sh
      - run: bash -n scripts/verify_complete_article_run.sh
      - run: bash -n scripts/run_resume_functional_resilient.sh
      - name: Figure triplet smoke test
        run: python -m pytest -q -p no:cacheprovider tests/test_publication.py::test_scripted_figure_exports_png_pdf_svg
      - name: Axes overlap detection test
        run: python -m pytest -q -p no:cacheprovider tests/test_publication.py::test_axes_overlap_is_detected
      - name: Figure manifest test
        run: python -m pytest -q -p no:cacheprovider tests/test_publication.py::test_figure_manifest_and_legends
      - name: Strict layout rejection test
        run: python -m pytest -q -p no:cacheprovider tests/test_publication.py::test_strict_layout_rejects_overlap
      - name: Pharmacology tests
        run: python -m pytest -q -p no:cacheprovider tests/test_pharmacology.py
      - name: Structural annotation and PML tests
        run: python -m pytest -q -p no:cacheprovider tests/test_structural.py
      - name: DoRothEA resilience tests
        run: python -m pytest -q -p no:cacheprovider tests/test_dorothea_resilience.py
      - name: Complete test suite
        run: python -m pytest -q -p no:cacheprovider
      - name: Build complete directed NISE universe
        run: |
          python scripts/build_expanded_candidate_universe.py \
            --output /tmp/expanded_candidate_universe.tsv \
            --members-output /tmp/expanded_class_member_inventory.tsv
          python - <<'PY'
          import pandas as pd
          candidates = pd.read_csv('/tmp/expanded_candidate_universe.tsv', sep='\t')
          members = pd.read_csv('/tmp/expanded_class_member_inventory.tsv', sep='\t')
          nise = candidates.loc[candidates['source_class'].eq('NISE')]
          nise_members = members.loc[members['source_class'].eq('NISE'), 'gene'].nunique()
          assert nise['pair_id'].nunique() == 202
          assert nise_members == 70
          assert nise['group_id'].nunique() == 15
          PY
      - run: rses-onco score-literature
