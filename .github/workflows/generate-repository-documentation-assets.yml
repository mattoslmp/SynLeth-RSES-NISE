name: Generate repository documentation assets

on:
  workflow_dispatch:
  push:
    paths:
      - "docs/END_TO_END_ARTICLE_PROTOCOL.md"
      - "docs/DATA_ACQUISITION_AND_REPRODUCTION_V0110.md"
      - "docs/METHYLATION_DATA_AND_SCORING_V0111.md"
      - "docs/figures/RSES_Onco_workflow_and_applications.dot"
      - "supplementary/Supplementary_Methods_RSES_Onco_v0110.md"
      - "manuscript/RSES_Onco_intro_methods_draft_v0110.md"
      - "scripts/sync_methylation_documentation_v0111.py"
      - "scripts/generate_repository_documentation_assets.sh"
      - ".github/workflows/generate-repository-documentation-assets.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install documentation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            libreoffice-writer \
            graphviz

      - name: Synchronize sources and generate Word PDF SVG and PNG assets
        run: |
          chmod +x scripts/generate_repository_documentation_assets.sh
          bash scripts/generate_repository_documentation_assets.sh

      - name: Commit synchronized sources and binary assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            docs/END_TO_END_ARTICLE_PROTOCOL.md \
            docs/DATA_ACQUISITION_AND_REPRODUCTION_V0110.md \
            supplementary/Supplementary_Methods_RSES_Onco_v0110.md \
            supplementary/Supplementary_Methods_RSES_Onco_v0110.docx \
            supplementary/Supplementary_Methods_RSES_Onco_v0110.pdf \
            manuscript/RSES_Onco_intro_methods_draft_v0110.md \
            manuscript/RSES_Onco_intro_methods_draft_v0110.docx \
            manuscript/RSES_Onco_intro_methods_draft_v0110.pdf \
            docs/figures/RSES_Onco_workflow_and_applications.svg \
            docs/figures/RSES_Onco_workflow_and_applications.png

          if git diff --cached --quiet; then
            echo "Methylation-aware documentation assets are already current."
            exit 0
          fi

          git commit -m "Synchronize methylation-aware documentation and binaries"
          git push origin "HEAD:${GITHUB_REF_NAME}"
